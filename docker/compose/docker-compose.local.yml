version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: mmos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mmos
      POSTGRES_USER: mmos
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mmos-network

  redis:
    image: redis:7-alpine
    container_name: mmos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mmos-network

volumes:
  postgres-data:
  redis-data:

networks:
  mmos-network:
    driver: bridge
